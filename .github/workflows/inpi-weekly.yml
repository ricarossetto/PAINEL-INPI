name: Atualizar Painel INPI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "public/data/inpi-dashboard.json"
      - "public/data/notified-matches.json"
      - "public/data/pending-notifications.json"
  schedule:
    - cron: "0 18 * * 2"
  workflow_dispatch:
    inputs:
      scan_limit:
        description: "Quantidade de RPIs para varrer nesta execução manual"
        required: false
        default: "1"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: inpi-pages
  cancel-in-progress: true

jobs:
  scan-notify-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Varredura da RPI
        id: scan
        continue-on-error: true
        run: python scripts/scan_inpi.py --limit "$SCAN_LIMIT" --pause 4 --download-retries 8
        env:
          SCAN_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.scan_limit || '1' }}

      - name: Enviar notificacoes
        if: steps.scan.outcome == 'success'
        run: python scripts/send_notifications.py
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TLS: ${{ secrets.SMTP_TLS }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}

      - name: Salvar dados atualizados
        if: steps.scan.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add public/data/*.json
          if ! git diff --cached --quiet; then
            git commit -m "Atualiza dados da RPI"
            git push
          fi

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Publicar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
