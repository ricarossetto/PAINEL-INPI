name: Atualizar Painel INPI

on:
  schedule:
    - cron: "0 18 * * 2"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: inpi-pages
  cancel-in-progress: false

jobs:
  scan-notify-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Varredura da RPI
        run: python scripts/scan_inpi.py --limit 10 --pause 4 --download-retries 8

      - name: Enviar notificacoes
        run: python scripts/send_notifications.py
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TLS: ${{ secrets.SMTP_TLS }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}

      - name: Salvar dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json
          if ! git diff --cached --quiet; then
            git commit -m "Atualiza dados da RPI"
            git push
          fi

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Publicar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
